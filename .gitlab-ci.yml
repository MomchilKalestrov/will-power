stages:
  - prepare-release-data
  - build-docker-image
  - publish-docker-image
  - update-github-mirror

prepare-release-data:
  stage: prepare-release-data
  image: ubuntu:latest
  only:
    - master
  before_script:
    - apt-get update && apt-get install -y git curl
    - curl -fsSL https://deb.nodesource.com/setup_24.x | bash -
    - apt-get install -y nodejs
    - git config user.name "gitlab-ci"
    - git config user.email "gitlab-ci@gitlab.com"
  script:
    - DATE_TAG=$(date +v%Y.%m.%d-%H%M)
    - CHANGELOG=$(node makeChangelog.js)
    - "echo Generated tag: $DATE_TAG"
    - printf 'DATE_TAG=%s\n' "$DATE_TAG" > release.env
    - printf 'CHANGELOG="%s"\n' "$CHANGELOG" >> release.env
    - git tag $DATE_TAG
    - git push https://gitlab-ci-token:${CI_JOB_TOKEN}@${CI_SERVER_HOST}/${CI_PROJECT_PATH}.git $DATE_TAG
  artifacts:
    reports:
      dotenv: release.env

build-docker-image:
  stage: build-docker-image
  image: docker:latest
  services:
    - docker:dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "/certs/client"
  dependencies:
    - prepare-release-data
  only:
    - master
  script:
    - docker build -t seraphimcms-${DATE_TAG} .
    - docker save seraphimcms-${DATE_TAG} -o seraphimcms-${DATE_TAG}.tar
  artifacts:
    paths:
      - seraphimcms-${DATE_TAG}.tar

publish-docker-image:
  stage: publish-docker-image
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  only:
    - master
  script:
    - uname -r
    - echo "Creating release for ${DATE_TAG}"
  release:
    tag_name: ${DATE_TAG}
    name: 'Release ${DATE_TAG}'
    description: 'Automated release for ${DATE_TAG}\n\n${CHANGELOG}'
    assets:
      links:
        - name: seraphimcms-${DATE_TAG}.tar
          url: https://${CI_SERVER_HOST}/${CI_PROJECT_PATH}/-/jobs/artifacts/${CI_COMMIT_REF_NAME}/raw/seraphimcms-${DATE_TAG}.tar
          link_type: other

update-github-mirror:
  stage: update-github-mirror
  image: ubuntu:latest
  only:
    - master
  before_script:
    - apt-get update && apt-get install -y git
  script:
    - git remote add github https://MomchilKalestrov:${GITHUB_MIRROR_TOKEN}@github.com/MomchilKalestrov/will-power.git
    - git push github HEAD:master --force